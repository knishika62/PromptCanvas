<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PromptCanvas</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260612-presets" />
  </head>
  <body>
    <main class="workspace">
      <aside class="panel items-panel" aria-label="Detected items">
        <div class="panel-head">
          <span class="eyebrow">Prompt</span>
        </div>
        <div class="prompt-fields">
          <label class="field">
            <span>High level</span>
            <textarea id="highLevelInput" rows="3" aria-label="High level description"></textarea>
          </label>
          <label class="field">
            <span>Style</span>
            <select id="stylePresetInput" aria-label="Style preset">
              <option value="none">Omit style</option>
              <option value="photograph">Photograph</option>
              <option value="illustration">Illustration</option>
              <option value="render3d">3D render</option>
              <option value="graphic_design">Graphic design</option>
              <option value="painting">Painting</option>
              <option value="custom_photo">Custom photo</option>
              <option value="custom_art">Custom art</option>
            </select>
          </label>
          <div id="styleFields" class="style-fields" hidden>
            <label class="field">
              <span>Aesthetics</span>
              <input id="styleAestheticsInput" type="text" aria-label="Style aesthetics" />
            </label>
            <label class="field">
              <span>Lighting</span>
              <input id="styleLightingInput" type="text" aria-label="Style lighting" />
            </label>
            <label id="stylePhotoField" class="field">
              <span>Photo</span>
              <input id="stylePhotoInput" type="text" aria-label="Photo style" />
            </label>
            <label id="styleArtField" class="field">
              <span>Art style</span>
              <input id="styleArtStyleInput" type="text" aria-label="Art style" />
            </label>
            <label class="field">
              <span>Medium</span>
              <input id="styleMediumInput" type="text" aria-label="Style medium" />
            </label>
            <label class="field">
              <span>Palette</span>
              <input id="stylePaletteInput" type="text" aria-label="Style color palette" />
            </label>
          </div>
          <label class="field">
            <span>Background</span>
            <textarea id="backgroundInput" rows="3" aria-label="Background description"></textarea>
          </label>
        </div>
        <div class="panel-head">
          <span class="eyebrow">Elements</span>
          <button id="addBoxBtn" class="icon-button" title="Add box" type="button">+</button>
        </div>
        <div id="emptyItems" class="quiet">Drop an image to create editable zones.</div>
        <div id="itemsList" class="items-list"></div>
      </aside>

      <section id="dropzone" class="stage text-mode" aria-label="Image editor">
        <div class="stage-tabs" role="tablist" aria-label="Input mode">
          <button id="tabText" class="tab active" type="button" role="tab">Text</button>
          <button id="tabImage" class="tab" type="button" role="tab">Image</button>
        </div>
        <div id="textGenPanel" class="text-gen">
          <textarea id="textGenInput" rows="3" placeholder="Describe the image you want (English works best)..." aria-label="Image description"></textarea>
          <div class="text-gen-controls">
            <select id="textGenAspect" aria-label="Aspect ratio">
              <option>1:1</option>
              <option>9:16</option>
              <option>16:9</option>
              <option>4:3</option>
              <option>3:4</option>
              <option>3:2</option>
              <option selected>2:3</option>
              <option>4:5</option>
              <option>5:4</option>
            </select>
            <select id="textGenPreset" aria-label="Style preset">
              <option value="">Default</option>
            </select>
            <button id="textGenBtn" class="upload-button" type="button">Generate</button>
          </div>
        </div>
        <input id="fileInput" type="file" accept="image/*" hidden />
        <div id="emptyState" class="empty-state" hidden>
          <button id="pickFileBtn" class="upload-button" type="button">Choose image</button>
          <p>or drop / paste one here</p>
        </div>
        <div id="loadingState" class="loading-state" hidden>
          <div class="spinner" aria-hidden="true"></div>
          <span>Analyzing image</span>
        </div>
        <div id="imageWrap" class="image-wrap" hidden>
          <img id="previewImage" alt="Uploaded image" />
          <div id="overlay" class="overlay"></div>
        </div>
        <div class="stage-toolbar" aria-label="Image tools">
          <button id="autoDetectBtn" type="button">Auto detect</button>
          <button id="resetBtn" type="button">Reset</button>
        </div>
      </section>

      <aside class="panel json-panel" aria-label="Prompt output">
        <div class="panel-section">
          <div class="panel-head">
            <span class="eyebrow">JSON</span>
            <span id="jsonStatus" class="json-status">Valid</span>
            <div class="actions">
              <button id="copyBtn" type="button">Copy</button>
              <button id="exportBtn" type="button">Export</button>
            </div>
          </div>
          <textarea id="jsonPreview" class="json-preview" spellcheck="false" aria-label="Editable JSON prompt">{}</textarea>
        </div>
        <div class="panel-section">
          <div class="panel-head">
            <span class="eyebrow">Prompt (text)</span>
            <div class="actions">
              <button id="copyTextBtn" type="button">Copy</button>
              <button id="exportTextBtn" type="button">Export</button>
            </div>
          </div>
          <textarea id="textPreview" class="json-preview" spellcheck="false" readonly aria-label="Natural language prompt"></textarea>
        </div>
      </aside>
    </main>
    <div id="appBadge" class="app-badge">PromptCanvas</div>
    <script src="/static/app.js?v=20260612-presets"></script>
  </body>
</html>
